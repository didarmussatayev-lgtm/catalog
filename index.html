<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Univermag Shop</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --gray: #64748b; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f8fafc; }
        
        header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; }
        .search-container { flex-grow: 1; margin: 0 10px; }
        .search-container input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .cart-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 220px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 10px; flex-shrink: 0; }
        #content { flex-grow: 1; padding: 15px; overflow-y: auto; background: #f8fafc; }

        .group-item { padding: 12px; margin-bottom: 4px; cursor: pointer; border-radius: 8px; font-size: 0.9rem; transition: 0.2s; }
        .group-item:hover { background: #f1f5f9; }
        .group-item.active { background: var(--primary); color: white; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }

        @media (max-width: 600px) {
            #sidebar { width: 100px; padding: 5px; }
            .group-item { font-size: 0.75rem; padding: 8px; }
            .product-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .search-container { margin: 0 5px; }
        }

        .card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .add-btn { background: #eff6ff; color: var(--primary); border: 1px solid #dbeafe; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 15px; }
        .modal-body { background: white; width: 100%; max-width: 450px; max-height: 90vh; border-radius: 16px; padding: 20px; overflow-y: auto; }
        .flying-item { position: fixed; pointer-events: none; transition: all 0.7s ease-in; background: var(--primary); width: 15px; height: 15px; border-radius: 50%; z-index: 999; }
    </style>
</head>
<body>

<header>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск..." oninput="filterProducts()">
    </div>
    <button class="cart-btn" id="cart-anchor" onclick="openCart()">🛒 <span id="cart-count">0</span></button>
</header>

<div class="main-container">
    <div id="sidebar"><div id="group-list">Загрузка категорий...</div></div>
    <div id="content">
        <h3 id="current-category" style="margin: 0 0 15px 0;">Выберите категорию</h3>
        <div id="product-grid" class="product-grid"></div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="margin-top:0">Корзина</h3>
        <div id="cart-items"></div>
        <div style="text-align:right; margin: 15px 0; font-size: 1.1rem;">Итого: <b id="total-price">0</b> ₸</div>
        <input type="text" id="user_fio" placeholder="Ваше Имя" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="tel" id="user_phone" placeholder="Телефон" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <button onclick="sendOrder()" style="width:100%; background:var(--success); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">ОТПРАВИТЬ ЗАКАЗ</button>
        <button onclick="closeCart()" style="width:100%; background:none; border:none; color:var(--gray); margin-top:10px; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script>
    let catalogData = [];
    let cart = {};
    let currentFilteredItems = [];

    // ГЛАВНОЕ: Запуск только после полной загрузки страницы
    window.addEventListener('DOMContentLoaded', () => {
        loadData();
    });

    async function loadData() {
        try {
            const res = await fetch('univermag 06-05-2026.json');
            if (!res.ok) throw new Error("Файл JSON не найден");
            const data = await res.json();
            catalogData = data.item_groups || [];
            
            const list = document.getElementById('group-list');
            list.innerHTML = catalogData.map((g, i) => 
                `<div class="group-item" onclick="selectGroup(${i}, this)">${g.name}</div>`
            ).join('');
        } catch (e) {
            document.getElementById('group-list').innerHTML = `<span style="color:red">Ошибка: ${e.message}</span>`;
        }
    }

    function selectGroup(idx, el) {
        document.querySelectorAll('.group-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('search-input').value = '';
        const group = catalogData[idx];
        document.getElementById('current-category').innerText = group.name;
        renderGrid(group.items || []);
    }

    function filterProducts() {
        const q = document.getElementById('search-input').value.toLowerCase();
        if (!q) return;

        let found = [];
        catalogData.forEach(g => {
            const match = (g.items || []).filter(item => 
                item.name.toLowerCase().includes(q) || (item.mainShtrih && String(item.mainShtrih).includes(q))
            );
            found = found.concat(match);
        });

        document.getElementById('current-category').innerText = `Найдено: ${found.length}`;
        renderGrid(found);
    }

    function renderGrid(items, append = false) {
        const grid = document.getElementById('product-grid');
        if (!append) {
            grid.innerHTML = '';
            currentFilteredItems = items;
            document.getElementById('content').scrollTop = 0;
        }

        const currentCount = grid.children.length;
        const chunk = items.slice(currentCount, currentCount + 20);

        const html = chunk.map(item => `
            <div class="card">
                <div style="font-size:0.8rem; font-weight:600; height:35px; overflow:hidden;">${item.name}</div>
                <div style="color:var(--primary); font-weight:bold; margin:10px 0;">${item.price} ₸</div>
                <button class="add-btn" onclick="animateFly(this, '${item.object_id}', '${item.name.replace(/'/g, "")}', ${item.price})">Выбрать</button>
            </div>
        `).join('');

        grid.insertAdjacentHTML('beforeend', html);
    }

    // Бесконечный скролл
    document.getElementById('content').addEventListener('scroll', function() {
        if (this.scrollTop + this.clientHeight >= this.scrollHeight - 50) {
            if (currentFilteredItems.length > document.getElementById('product-grid').children.length) {
                renderGrid(currentFilteredItems, true);
            }
        }
    });

    function animateFly(btn, id, name, price) {
        const cartAnchor = document.getElementById('cart-anchor');
        const r = btn.getBoundingClientRect();
        const cr = cartAnchor.getBoundingClientRect();

        const f = document.createElement('div');
        f.className = 'flying-item';
        f.style.left = r.left + 'px';
        f.style.top = r.top + 'px';
        document.body.appendChild(f);

        setTimeout(() => {
            f.style.left = cr.left + 15 + 'px';
            f.style.top = cr.top + 15 + 'px';
            f.style.opacity = '0';
        }, 50);

        setTimeout(() => {
            f.remove();
            if (cart[id]) cart[id].qty++; else cart[id] = { name, price, qty: 1 };
            updateUI();
        }, 650);
    }

    function updateUI() {
        const keys = Object.keys(cart);
        document.getElementById('cart-count').innerText = keys.length;
        let total = 0;
        document.getElementById('cart-items').innerHTML = keys.map(id => {
            const i = cart[id];
            total += i.price * i.qty;
            return `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:0.85rem;">
                <span>${i.name} x${i.qty}</span>
                <b>${i.price * i.qty} ₸</b>
            </div>`;
        }).join('');
        document.getElementById('total-price').innerText = total;
    }

    function openCart() { document.getElementById('modal').style.display = 'flex'; }
    function closeCart() { document.getElementById('modal').style.display = 'none'; }

    async function sendOrder() {
        const fio = document.getElementById('user_fio').value;
        const phone = document.getElementById('user_phone').value;
        if (!fio || !phone) return alert("Введите данные");

        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "ОТПРАВЛЯЕМ...";

        try {
            await fetch('https://primary-production-7f078.up.railway.app/webhook/e07f6f59-33d3-4610-85f0-61be7791f37e', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fio, phone, cart, total: document.getElementById('total-price').innerText })
            });
            alert("Заказ принят!");
            cart = {}; updateUI(); closeCart();
        } catch (e) {
            alert("Ошибка сети");
        } finally {
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ ЗАКАЗ";
        }
    }
</script>

</body>
</html>
