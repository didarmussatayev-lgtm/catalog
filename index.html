<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Univermag - Оформление заказа</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f8fafc; display: flex; flex-direction: column; height: 100vh; }
        header { background: #fff; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-status { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 20px; }
        .group-item { padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; }
        .group-item.active { background: var(--primary); color: white; }
        
        #content { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; }
        
        /* Модалка */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #64748b; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .qty-input { width: 50px; padding: 5px; text-align: center; margin-left: 10px; }
        .btn-confirm { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">UNIVERMAG</h2>
    <div class="cart-status" onclick="toggleCart()">🛒 Корзина (<span id="cart-count">0</span>)</div>
</header>

<div class="main-layout">
    <div id="sidebar">
        <h3>Категории</h3>
        <div id="group-list"></div>
    </div>
    <div id="content">
        <h2 id="group-title">Выберите категорию</h2>
        <div id="items-container" class="items-grid"></div>
    </div>
</div>

<div id="cart-modal">
    <div class="modal-content">
        <h3>Оформление заказа</h3>
        
        <div class="form-group">
            <label>ФИО</label>
            <input type="text" id="cust_name" placeholder="Иван Иванов">
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="cust_phone" placeholder="+7 (___) ___ __ __">
        </div>
        <div class="form-group">
            <label>Адрес доставки</label>
            <input type="text" id="cust_address" placeholder="Город, улица, дом">
        </div>

        <hr>
        <h4>Товары в корзине</h4>
        <div id="cart-items-list"></div>
        <h3 id="cart-total" style="text-align: right;"></h3>

        <button class="btn-confirm" onclick="sendOrder()">ПОДТВЕРДИТЬ ЗАКАЗ</button>
        <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:#94a3b8; cursor:pointer; margin-top:10px;">Отмена</button>
    </div>
</div>

<script>
    // Сюда вставляете ваш массив item_groups из JSON
    const catalogData = []; 

    let cart = {}; // Используем объект для хранения {id: {item, quantity}}

    function renderGroups() {
        const list = document.getElementById('group-list');
        list.innerHTML = catalogData.map((g, i) => `
            <div class="group-item" onclick="showItems(${i}, this)">${g.name}</div>
        `).join('');
    }

    function showItems(index, el) {
        document.querySelectorAll('.group-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const group = catalogData[index];
        document.getElementById('group-title').innerText = group.name;
        
        document.getElementById('items-container').innerHTML = group.items.map(item => `
            <div class="product-card">
                <div style="font-weight:600">${item.name}</div>
                <div style="color:var(--primary)">${item.price} ₸</div>
                <button class="btn-add" style="background:var(--primary); color:white; border:none; padding:8px; border-radius:6px; cursor:pointer;" 
                    onclick="addToCart('${item.object_id}', '${item.name}', ${item.price})">Выбрать</button>
            </div>
        `).join('');
    }

    function addToCart(id, name, price) {
        if (cart[id]) {
            cart[id].quantity += 1;
        } else {
            cart[id] = { name, price, quantity: 1 };
        }
        updateUI();
    }

    function updateQty(id, newQty) {
        if (newQty < 1) {
            delete cart[id];
        } else {
            cart[id].quantity = parseInt(newQty);
        }
        updateUI();
    }

    function updateUI() {
        const keys = Object.keys(cart);
        document.getElementById('cart-count').innerText = keys.length;
        
        const list = document.getElementById('cart-items-list');
        let total = 0;
        
        list.innerHTML = keys.map(id => {
            const item = cart[id];
            total += item.price * item.quantity;
            return `
                <div class="cart-item">
                    <span style="flex-grow:1; font-size:0.9rem;">${item.name}</span>
                    <input type="number" class="qty-input" value="${item.quantity}" onchange="updateQty('${id}', this.value)">
                    <span style="margin-left:15px; font-weight:600;">${item.price * item.quantity} ₸</span>
                </div>
            `;
        }).join('');
        
        document.getElementById('cart-total').innerText = `Итого: ${total} ₸`;
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    async function sendOrder() {
        const keys = Object.keys(cart);
        if (keys.length === 0) return alert("Корзина пуста!");

        // Собираем данные клиента
        const customer = {
            fio: document.getElementById('cust_name').value,
            phone: document.getElementById('cust_phone').value,
            address: document.getElementById('cust_address').value
        };

        if (!customer.fio || !customer.phone) return alert("Заполните ФИО и Телефон!");

        // Формируем массив order_items
        const order_items = keys.map(id => ({
            product_id: id,
            name: cart[id].name,
            price: cart[id].price,
            quantity: cart[id].quantity,
            subtotal: cart[id].price * cart[id].quantity
        }));

        const payload = {
            customer: customer,
            order_items: order_items,
            total_amount: order_items.reduce((s, i) => s + i.subtotal, 0),
            date: new Date().toLocaleString()
        };

        try {
            const response = await fetch('https://primary-production-7f078.up.railway.app/webhook-test/univermag', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Заказ успешно отправлен!");
                cart = {};
                updateUI();
                toggleCart();
            } else {
                alert("Ошибка сервера. Проверьте CORS в n8n.");
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка сети.");
        }
    }

    // Заглушка для теста (если не вставили данные)
    if (catalogData.length > 0) renderGroups();
</script>

</body>
</html>
