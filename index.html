<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина товаров</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* Боковая панель с группами */
        #sidebar {
            width: 300px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
        }

        #sidebar h2 {
            font-size: 1.2rem;
            color: #333;
        }

        .group-item {
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .group-item:hover {
            background-color: #e0e7ff;
        }

        .group-item.active {
            background-color: #4f46e5;
            color: white;
        }

        /* Основной контент с товарами */
        #content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product-card h3 {
            font-size: 1rem;
            margin: 0 0 10px 0;
            color: #444;
        }

        .price {
            font-weight: bold;
            color: #2563eb;
        }

        .article {
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Категории</h2>
        <div id="group-list">Загрузка групп...</div>
    </div>

    <div id="content">
        <h2 id="selected-group-name">Выберите категорию</h2>
        <div id="items-container" class="items-grid"></div>
    </div>

    <script>
        let catalogData = [];

        // Функция для загрузки JSON
        async function loadData() {
            try {
                // Укажите здесь имя вашего файла
                const response = await fetch('univermag 06-05-2026.json');
                const data = await response.json();
                
                // Предполагаем структуру: data.item_groups
                catalogData = data.item_groups;
                renderGroups();
            } catch (error) {
                console.error("Ошибка загрузки данных:", error);
                document.getElementById('group-list').innerText = "Ошибка загрузки файла JSON.";
            }
        }

        // Отображение списка групп слева
        function renderGroups() {
            const groupList = document.getElementById('group-list');
            groupList.innerHTML = '';

            catalogData.forEach((group, index) => {
                const div = document.createElement('div');
                div.className = 'group-item';
                div.innerText = group.name;
                div.onclick = () => showItems(index, div);
                groupList.appendChild(div);
            });
        }

        // Отображение товаров выбранной группы
        function showItems(groupIndex, element) {
            // Подсветка активной группы
            document.querySelectorAll('.group-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const group = catalogData[groupIndex];
            document.getElementById('selected-group-name').innerText = group.name;
            
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            if (group.items && group.items.length > 0) {
                group.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <h3>${item.name}</h3>
                        <p class="price">${item.price} ₸</p>
                        <p class="article">Артикул: ${item.article || '—'}</p>
                        <p class="article">Штрих-код: ${item.mainShtrih}</p>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p>В этой категории нет товаров.</p>';
            }
        }

        // Запуск при загрузке страницы
        loadData();
    </script>
</body>
</html>
